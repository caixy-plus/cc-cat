name: AppCat
options:
  bundleIdPrefix: com.caixinyun
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
targets:
  AppCat:
    type: application
    platform: macOS
    sources:
      - path: Sources/AppCat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.caixinyun.AppCat
        PRODUCT_NAME: AppCat
        PRODUCT_MODULE_NAME: AppCat
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/AppCat/Resources/Info.plist
        SWIFT_STRICT_CONCURRENCY: minimal
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  AppCatTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/AppCatTests
    dependencies:
      - target: AppCat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.caixinyun.AppCatTests
        GENERATE_INFOPLIST_FILE: YES

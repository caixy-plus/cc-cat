name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (without leading v)"
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build macOS app & create DMG
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release
        run: |
          xcodebuild \
            -project SwiftUninstall.xcodeproj \
            -scheme SwiftUninstall \
            -configuration Release \
            -derivedDataPath .release \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Stage .app for packaging
        run: |
          mkdir -p dist
          rm -rf dist/应用卸载器.app
          ditto .release/Build/Products/Release/SwiftUninstall.app "dist/应用卸载器.app"

      - name: Determine version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Create DMG
        run: |
          DMG="dist/SwiftUninstall-v${{ steps.ver.outputs.version }}.dmg"
          hdiutil create -volname "SwiftUninstall" -srcfolder "dist/应用卸载器.app" -ov -format UDZO "$DMG"
          echo "Created $DMG"
          ls -lh dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwiftUninstall-v${{ steps.ver.outputs.version }}
          path: dist/*.dmg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \
            "dist/SwiftUninstall-v${{ steps.ver.outputs.version }}.dmg" \
            --title "v${{ steps.ver.outputs.version }}" \
            --generate-notes
